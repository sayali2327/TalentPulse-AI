name: Trigger Render Deploy for Backend

on:
  push:
    branches: [ master ]

jobs:
  trigger-render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Optional: Run backend tests
        run: |
          python -V || true
          if [ -f backend/requirements.txt ]; then python -m pip install -r backend/requirements.txt; fi
        shell: bash

      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          # Render deploy trigger. Set RENDER_API_KEY and RENDER_SERVICE_ID in repo secrets.
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "Missing RENDER_API_KEY or RENDER_SERVICE_ID secrets"; exit 1;
          fi
          curl -X POST "https://api.render.com/deploy/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": true}'
        shell: bash
